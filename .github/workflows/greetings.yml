name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Hello! Looks like you have opened your first issue in this repository, we wish you luck to fix the issue by yourself or with a contributor!"
          pr-message: "Hello! Looks like you have opened your first PR in this repository, have a nice time contributing and thanks for this PR!"
